tasks:
  # ═══════ Layer 1: Data Collection ═══════════════════════
  candles_downloader_bybit:
    enabled: true
    task_class: app.tasks.data_collection.candles_downloader_task.CandlesDownloaderTask
    schedule:
      type: cron
      cron: "5 * * * *"
      timezone: UTC
    max_retries: 3
    retry_delay_seconds: 120
    timeout_seconds: 1800
    config:
      connector_name: "bybit_perpetual"
      quote_asset: "USDT"
      intervals: ["1h", "5m", "1m"]
      days_data_retention: 7
      min_notional_size: 10
    tags: [data, candles, bybit]

  candles_downloader_hyperliquid:
    enabled: true
    task_class: app.tasks.data_collection.hyperliquid_candles_task.HyperliquidCandlesTask
    schedule:
      type: cron
      cron: "10 * * * *"
      timezone: UTC
    max_retries: 3
    retry_delay_seconds: 120
    timeout_seconds: 900
    config:
      collection_name: "hyperliquid_candles_1h"
      interval: "1h"
      max_pairs: 15
      lookback_hours: 48
      bybit_collection: "bybit_funding_rates"
      write_parquet: true
      priority_pairs: ["FARTCOIN-USDT", "HYPE-USDT", "SOL-USDT", "BTC-USDT", "ETH-USDT"]
    tags: [data, candles, hyperliquid]

  bybit_derivatives:
    enabled: true
    task_class: app.tasks.data_collection.bybit_derivatives_task.BybitDerivativesTask
    schedule:
      type: cron
      cron: "*/15 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 600
    config:
      pairs: "auto"
      min_volume_usd: 10000000
      oi_interval: "1h"
      funding_limit: 10
      oi_limit: 10
      ls_limit: 10
    tags: [data, derivatives, bybit]

  binance_funding:
    enabled: true
    task_class: app.tasks.data_collection.binance_funding_task.BinanceFundingTask
    schedule:
      type: cron
      cron: "*/15 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 600
    config:
      pairs: "auto"
      funding_limit: 5
    tags: [data, funding, binance]

  binance_top_trader:
    enabled: true
    task_class: app.tasks.data_collection.binance_top_trader_task.BinanceTopTraderTask
    schedule:
      type: cron
      cron: "5,35 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 300
    config:
      period: "1h"
      limit: 50
    tags: [data, positioning, binance, x14]

  okx_funding:
    enabled: true
    task_class: app.tasks.data_collection.okx_funding_task.OKXFundingTask
    schedule:
      type: cron
      cron: "10,40 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 300
    config:
      limit: 100
    tags: [data, funding, okx, exotic]

  # ═══════ Layer 1b: Exotic Data Collection ═══════════════
  deribit_options:
    enabled: true
    task_class: app.tasks.data_collection.deribit_options_task.DeribitOptionsSurfaceTask
    schedule:
      type: cron
      cron: "*/15 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 300
    config:
      currencies: ["BTC", "ETH"]
      collection_name: "deribit_options_surface"
    tags: [data, options, deribit, exotic]

  deribit_dvol:
    enabled: true
    task_class: app.tasks.data_collection.deribit_dvol_task.DeribitDvolTask
    schedule:
      type: cron
      cron: "*/15 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 300
    config:
      currencies: ["BTC", "ETH"]
      resolution: 3600
      collection_name: "deribit_dvol"
    tags: [data, dvol, deribit, exotic]

  hyperliquid_funding:
    enabled: true
    task_class: app.tasks.data_collection.hyperliquid_funding_task.HyperliquidFundingTask
    schedule:
      type: cron
      cron: "*/15 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 600
    config:
      collection_name: "hyperliquid_funding_rates"
      backfill_days: 365
    tags: [data, funding, hyperliquid, exotic]

  hyperliquid_microstructure_1s:
    enabled: true
    task_class: app.tasks.data_collection.hyperliquid_microstructure_task.HyperliquidMicrostructureTask
    schedule:
      type: cron
      cron: "* * * * *"
      timezone: UTC
    max_retries: 1
    retry_delay_seconds: 10
    timeout_seconds: 58
    config:
      pairs: ["BTC-USDT", "ETH-USDT", "SOL-USDT", "HYPE-USDT", "ZEC-USDT", "PENDLE-USDT", "APE-USDT"]
      max_pairs: 7
      restrict_to_bybit_pairs: false
      bybit_collection: "bybit_funding_rates"
      duration_seconds: 50
      poll_seconds: 1.0
      max_levels: 20
      write_mongo: true
      write_parquet: true
      book_collection: "hyperliquid_l2_snapshots_1s"
      trades_collection: "hyperliquid_recent_trades_1s"
      out_dir: "app/data/cache/hyperliquid_micro_1s"
    tags: [data, hyperliquid, microstructure, 1s, exotic]

  coinalyze:
    enabled: true
    task_class: app.tasks.data_collection.coinalyze_task.CoinalyzeTask
    schedule:
      type: cron
      cron: "*/15 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 600
    config:
      api_key_env: "COINALYZE_API_KEY"
      liq_collection: "coinalyze_liquidations"
      oi_collection: "coinalyze_oi"
      backfill_daily_days: 365
      hourly_lookback_days: 90
    tags: [data, liquidations, oi, coinalyze, exotic]

  coinglass:
    enabled: false  # Requires paid plan ($50-100/mo). Replaced by Coinalyze.
    task_class: app.tasks.data_collection.coinglass_task.CoinglassTask
    schedule:
      type: cron
      cron: "*/15 * * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 300
    config:
      pairs: "auto"
      liquidation_interval: "1h"
      oi_interval: "1h"
      liquidation_limit: 24
      oi_limit: 24
    tags: [data, liquidations, oi, coinglass, exotic]

  fear_greed:
    enabled: true
    task_class: app.tasks.data_collection.fear_greed_task.FearGreedTask
    schedule:
      type: cron
      cron: "0 0 * * *"
      timezone: UTC
    max_retries: 2
    retry_delay_seconds: 120
    timeout_seconds: 60
    config:
      limit: 7
      collection_name: "fear_greed_index"
    tags: [data, sentiment, exotic]

  storage_guard:
    enabled: true
    task_class: app.tasks.data_collection.storage_guard_task.StorageGuardTask
    schedule:
      type: cron
      cron: "0 6 * * *"
      timezone: UTC
    max_retries: 1
    retry_delay_seconds: 60
    timeout_seconds: 120
    config:
      mongo_uri: "mongodb://localhost:27017/quants_lab"
      mongo_database: "quants_lab"
    tags: [ops, monitoring]

  continuous_validation:
    enabled: true
    task_class: app.tasks.backtesting.continuous_validation_task.ContinuousValidationTask
    schedule:
      type: cron
      cron: "0 3 * * 0"
      timezone: UTC
    max_retries: 1
    retry_delay_seconds: 60
    timeout_seconds: 1800
    config:
      mongo_uri: "mongodb://localhost:27017/quants_lab"
      mongo_database: "quants_lab"
      engines: ["X10"]
      lookback_days: 90
      degradation_pf_threshold: 0.3
      connector_name: "bybit_perpetual"
    tags: [backtesting, monitoring, validation]

  tick_aggregation:
    enabled: true
    task_class: app.tasks.data_collection.tick_aggregation_task.TickAggregationTask
    schedule:
      type: cron
      cron: "0 4 * * *"
      timezone: UTC
    max_retries: 1
    retry_delay_seconds: 60
    timeout_seconds: 600
    config:
      mongo_uri: "mongodb://localhost:27017/quants_lab"
      mongo_database: "quants_lab"
      lookback_days: 2
    tags: [ops, aggregation]

  data_retention:
    enabled: true
    task_class: app.tasks.data_collection.data_retention_task.DataRetentionTask
    schedule:
      type: cron
      cron: "30 5 * * *"
      timezone: UTC
    max_retries: 1
    retry_delay_seconds: 60
    timeout_seconds: 300
    config:
      mongo_uri: "mongodb://localhost:27017/quants_lab"
      mongo_database: "quants_lab"
    tags: [ops, maintenance]

  # ═══════ Layer 2: Feature Computation ═══════════════════
  feature_computation:
    enabled: true
    task_class: app.tasks.screening.feature_computation_task.FeatureComputationTask
    schedule:
      type: frequency
      frequency_hours: 999
    dependencies:
      - task_name: "candles_downloader_bybit"
        on_success: true
        delay_seconds: 10
      - task_name: "bybit_derivatives"
        on_success: true
        delay_seconds: 5
      - task_name: "deribit_options"
        on_success: true
        delay_seconds: 5
      - task_name: "coinalyze"
        on_success: true
        delay_seconds: 5
    max_retries: 2
    retry_delay_seconds: 60
    timeout_seconds: 600
    config:
      connector_name: "bybit_perpetual"
      interval: "1h"
      min_bars: 30
    tags: [features, computation]

  # ═══════ Layer 3: Signal Scanning ═══════════════════════
  # ═══════ Layer 3: Signal Scanning (legacy — E2 only) ═════
  # E1 is deployed as HB-native bot (see: python cli.py deploy --engine E1)
  signal_scan:
    enabled: true
    task_class: app.tasks.screening.signal_scan_task.SignalScanTask
    schedule:
      type: frequency
      frequency_hours: 999
    dependencies:
      - task_name: "feature_computation"
        on_success: true
        delay_seconds: 5
    max_retries: 1
    timeout_seconds: 300
    config:
      engines: ["E2"]
      connector_name: "bybit_perpetual"
      top_n: 0
      telegram_chat_id: "-1003576397888"
    tags: [screening, signals]

  # ═══════ Layer 3b: Real-Time Breakout Monitor ═══════════
  # DISABLED: E1 uses HB-native bot with WebSocket feeds
  breakout_monitor:
    enabled: false
    task_class: app.tasks.screening.breakout_monitor_task.BreakoutMonitorTask
    schedule:
      type: cron
      cron: "* * * * *"
      timezone: UTC
    max_retries: 1
    timeout_seconds: 30
    config:
      engine: "E1"
      connector_name: "bybit_perpetual"
      max_portfolio_positions: 40
    tags: [screening, realtime, breakout]

  # ═══════ Layer 4: Testnet Resolution (legacy — E2 only) ═
  # E1 executor lifecycle managed natively by HB bot
  testnet_resolver:
    enabled: true
    task_class: app.tasks.resolution.testnet_resolver_task.TestnetResolverTask
    schedule:
      type: cron
      cron: "*/5 * * * *"
      timezone: UTC
    dependencies:
      - task_name: "signal_scan"
        on_success: true
        delay_seconds: 5
    max_retries: 2
    timeout_seconds: 120
    config:
      connector: "bybit_perpetual_testnet"
      account: "master_account"
      position_size_pct: 0.003
      fallback_capital: 100000
      engines: ["E2"]
      max_portfolio_positions: 40
    tags: [resolution, testnet]

  # ═══════ Infrastructure: Telegram Bot ═════════════════
  telegram_bot:
    enabled: true
    task_class: app.tasks.telegram_bot_task.TelegramBotTask
    schedule:
      type: cron
      cron: "* * * * *"
      timezone: UTC
    max_retries: 1
    timeout_seconds: 20
    config:
      poll_timeout: 5
    tags: [infra, telegram]

  # ═══════ Infrastructure: Portfolio Risk State ════════════
  risk_state_update:
    enabled: true
    task_class: app.tasks.risk_state_task.RiskStateTask
    schedule:
      type: cron
      cron: "* * * * *"
      timezone: UTC
    max_retries: 1
    timeout_seconds: 30
    config:
      fallback_capital: 50000
      initial_capital: 50000
    tags: [infra, risk]

  # ═══════ Execution: Thin Wrapper ═════════════════════════
  thin_executor:
    enabled: true
    task_class: app.tasks.execution.thin_executor_task.ThinExecutorTask
    schedule:
      type: cron
      cron: "* * * * *"
      timezone: UTC
    max_retries: 1
    timeout_seconds: 55
    config:
      strategies: ["X5"]
      signal_interval_s: 60
      lifecycle_interval_s: 30
    tags: [execution, x5]

  # ═══════ Infrastructure: Trade Recorder ═════════════════
  trade_recorder:
    enabled: true
    task_class: app.tasks.trade_recorder_task.TradeRecorderTask
    schedule:
      type: cron
      cron: "*/5 * * * *"
      timezone: UTC
    max_retries: 1
    timeout_seconds: 30
    config: {}
    tags: [infra, trades, recording]

  # ═══════ Infrastructure: Watchdog ══════════════════════
  watchdog:
    enabled: true
    task_class: app.tasks.watchdog_task.WatchdogTask
    schedule:
      type: cron
      cron: "*/5 * * * *"
      timezone: UTC
    max_retries: 1
    timeout_seconds: 300
    config: {}
    tags: [infra, watchdog]

  # ═══════ Daily: Signal Attribution ══════════════════════
  signal_attribution:
    enabled: true
    task_class: app.tasks.backtesting.signal_attribution_task.SignalAttributionTask
    schedule:
      type: cron
      cron: "0 1 * * *"
      timezone: UTC
    max_retries: 1
    timeout_seconds: 600
    config:
      lookback_hours: 48
      connector_name: "bybit_perpetual"
    tags: [reporting, attribution, daily]

  # ═══════ Daily: Performance Tracking ════════════════════
  performance_report:
    enabled: true
    task_class: app.tasks.reporting.performance_report_task.PerformanceReportTask
    schedule:
      type: cron
      cron: "0 0 * * *"
      timezone: UTC
    max_retries: 1
    timeout_seconds: 120
    config:
      engines: ["E1", "E2"]
      rolling_days: 30
      weekly_summary_day: 6
    tags: [reporting, performance, daily]

  # ═══════ Weekly: Re-optimization ════════════════════════
  e1_bulk_backtest:
    enabled: false  # DISABLED: run via scripts/run_backtest.sh — never in live trading process
    task_class: app.tasks.backtesting.bulk_backtest_task.BulkBacktestTask
